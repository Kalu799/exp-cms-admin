<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historique des visites</title>
  <script src="js/main.js" defer type="module"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="historique">
  
  <header>
    <h1>Dashboard</h1>
    <div class="nav">
      <nav>
        <a href="visites.html">Visites en cours</a>
        <a href="historique.html">Historique des visites</a>
        <a href="formations.html">Gestion des formations</a>
        <a href="personnels.html">Gestion du personnel</a>
      </nav>
      <a href="#" id="deconnexion">Se déconnecter</a>
    </div>
  </header>

  <main>
    <h2>Historique des visites</h2>
    <a href="" id="exportBtn">Exporter en CSV</a>

    <!-- Loader affiché pendant les appels API -->
    <div id="loader" class="hidden">
      <div>Chargement...</div>
    </div>

    <section>
      <form action="" id="historique-form">
        <label for="visite-date"></label>
        <input type="date" name="visite-date" id="visite-date">

        <button type="submit">Rechercher</button>
      </form>
    </section>

    <div>
      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Type</th>
            <th>Détails</th>
            <th>Local</th>
            <th>Date</th>
            <th>Heure d'entrée</th>
            <th>Heure de sortie</th>
          </tr>
        </thead>
        <tbody id="listing-historique">

        </tbody>
      </table>
    </div>

  </main>

  <footer>

  </footer>

</body>
</html>
